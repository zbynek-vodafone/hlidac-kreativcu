name: Denni Kontrola Kreativcu
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Automatické stažení kódu
        uses: actions/checkout@v4
      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Instalace potřebných doplňků
        run: pip install requests beautifulsoup4
      - name: Spuštění hlídače
        run: python skript.py
